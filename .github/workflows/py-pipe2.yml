name: Pytest Playwright Tests2

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write
  pages: write


jobs:
  test:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.x'
          cache: 'pip'

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install allure-pytest

      # Cache Playwright browsers
      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      # Install browsers if cache miss
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      # Run tests
      # pytest.ini should contain:
      # addopts = --alluredir=allure-results
      - name: Execute Tests
        run: pytest
        continue-on-error: true

      # Debug results
      - name: Debug Allure Results
        if: always()
        run: |
          echo "Listing allure-results folder"
          ls -la allure-results || true

      # Checkout gh-pages branch to load previous history
      - name: Load Allure History
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0

      # Copy previous history
      - name: Copy Allure History
        if: always()
        run: |
          mkdir -p allure-results/history
          if [ -d "gh-pages/history" ]; then
            cp -r gh-pages/history/ allure-results/
          else
            echo "No previous Allure history found"
          fi

      # Build new Allure report
      - name: Build Allure Report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20

      # Debug generated report
      - name: Debug Allure Output
        if: always()
        run: |
          echo "Listing allure-history folder"
          ls -la allure-history || true

      # Deploy report to GitHub Pages
      - name: Deploy Allure Report to GitHub Pages
        if: always() #github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          force_orphan: true

      # Post report link in workflow summary1
      - name: Post Link to Allure Report
        if: always()
        run: |
          echo "## Allure Test Report" >> $GITHUB_STEP_SUMMARY
          echo "View the latest report here:" >> $GITHUB_STEP_SUMMARY
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_STEP_SUMMARY